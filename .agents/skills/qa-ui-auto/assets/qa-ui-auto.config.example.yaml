# qa-ui-auto configuration
# Copy this file to project root as `qa-ui-auto.config.yaml` and fill in.
# Secrets MUST come from environment variables: ${env:VAR_NAME}.

app:
  base_url: http://localhost:5000   # Vite dev server in browser mode
  mode: browser                     # browser | native
  # native_binary: ./src-tauri/target/debug/newmob.exe   # used when mode=native on Windows

webdriver:
  host: 127.0.0.1
  port: 4444
  tauri_driver: tauri-driver        # cargo install tauri-driver --locked
  # native_driver: C:/path/to/msedgedriver.exe  # optional; otherwise PATH
  startup_timeout: 20

ssh:
  host: 127.0.0.1
  port: 2222
  user: testuser
  password: ${env:QA_SSH_PASSWORD}
  # private_key_path: ~/.ssh/id_ed25519
  # private_key_passphrase: ${env:QA_SSH_KEY_PASSPHRASE}

sftp:
  host: 127.0.0.1
  port: 2222
  user: testuser
  password: ${env:QA_SSH_PASSWORD}
  remote_test_dir: /config/qa-ui-auto

fixtures:
  start_local_sshd: false           # true → spin up linuxserver/openssh-server in Docker
  sshd_port: 2222
  sshd_user: testuser
  sshd_password: ${env:QA_SSH_PASSWORD}

report:
  dir: qa-ui-auto-report
  keep_runs: 5
